const palette = [
  '#000000', '#FF0000', '#00FF00', '#FFFF00', 
  '#0000FF', '#FF00FF', '#00FFFF', '#FFFFFF'
];

function drawTiles(containerId, tiles) {
  const container = document.getElementById(containerId);
  for (let i = 0; i < tiles.length; i++) {
    const canvas = document.createElement('canvas');
    canvas.width = 16;
    canvas.height = 16;
    canvas.title = "Tile " + i.toString(16);
    const ctx = canvas.getContext('2d');
    const imgData = ctx.createImageData(16, 16);
    
    for (let y = 0; y < 8; y++) {
      for (let x = 0; x < 8; x++) {
        let colIdx = tiles[i][y][x];
        // Standard mapping for display purposes
        let color = palette[colIdx];
        if (!color) color = '#000000';
        
        let rgb = [0,0,0,255];
        if (colIdx === 1) rgb = [255,0,0,255];
        else if (colIdx === 2) rgb = [0,255,0,255];
        else if (colIdx === 3) rgb = [255,255,0,255];
        else if (colIdx === 4) rgb = [0,0,255,255];
        else if (colIdx === 5) rgb = [255,0,255,255];
        else if (colIdx === 6) rgb = [0,255,255,255];
        else if (colIdx === 7) rgb = [255,255,255,255];
        
        // draw 2x2 pixels for scaling
        for(let dy=0; dy<2; dy++) {
            for(let dx=0; dx<2; dx++) {
                let px = (y*2+dy)*16*4 + (x*2+dx)*4;
                imgData.data[px] = rgb[0];
                imgData.data[px+1] = rgb[1];
                imgData.data[px+2] = rgb[2];
                imgData.data[px+3] = rgb[3];
            }
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);
    container.appendChild(canvas);
  }
}
